<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LessonLog_SMB School</title>
    <link rel="icon" type="image/x-icon" href="https://lh3.googleusercontent.com/d/1D4vTEwUZf9twSndugG7kUIn30OBUR3jH" />
    <script>
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || e.error === 'Script error.') {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      });
      window.onerror = function(msg) {
        if (msg === 'Script error.') return true;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
